name: PR Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  COMPOSER_PROCESS_TIMEOUT: 0
  COMPOSER_NO_INTERACTION: 1
  COMPOSER_NO_AUDIT: 1

jobs:
  lint:
    name: "Lint (PHPStan + CS)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, dom, filter, gd, json, zip

      - name: Clone Mautic
        run: git clone --depth 1 --branch 7.x https://github.com/mautic/mautic.git mautic

      - name: Link plugin
        run: ln -s ${{ github.workspace }}/plugin ${{ github.workspace }}/mautic/plugins/MautomicCrmBundle

      - name: Install dependencies
        uses: ramsey/composer-install@v3
        with:
          working-directory: mautic

      - name: Build test cache for PHPStan
        working-directory: mautic
        env:
          APP_ENV: test
          APP_DEBUG: 1
        run: |
          if [ ! -f var/cache/test/AppKernelTestDebugContainer.xml ]; then
            php bin/console > /dev/null 2>&1 || true
          fi

      - name: PHPStan (level 6)
        working-directory: mautic
        run: php -d memory_limit=1G bin/phpstan analyse plugins/MautomicCrmBundle --level=6 --no-progress

      - name: Coding Standards
        working-directory: mautic
        run: bin/php-cs-fixer fix plugins/MautomicCrmBundle --dry-run --diff --config=.php-cs-fixer.php --using-cache=no

  unit-tests:
    name: "Unit Tests"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, dom, filter, gd, json, zip

      - name: Clone Mautic
        run: git clone --depth 1 --branch 7.x https://github.com/mautic/mautic.git mautic

      - name: Link plugin
        run: ln -s ${{ github.workspace }}/plugin ${{ github.workspace }}/mautic/plugins/MautomicCrmBundle

      - name: Install dependencies
        uses: ramsey/composer-install@v3
        with:
          working-directory: mautic

      - name: Run unit tests
        working-directory: mautic
        run: php bin/phpunit plugins/MautomicCrmBundle/Tests/Unit/ --testdox

  functional-tests:
    name: "Functional Tests"
    runs-on: ubuntu-latest

    services:
      database:
        image: mysql:8.4
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: mautictest
        ports:
          - 3306
        options: >-
          --shm-size=2gb
          --tmpfs=/var/lib/mysql
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, dom, filter, gd, json, zip

      - name: Clone Mautic
        run: git clone --depth 1 --branch 7.x https://github.com/mautic/mautic.git mautic

      - name: Link plugin
        run: ln -s ${{ github.workspace }}/plugin ${{ github.workspace }}/mautic/plugins/MautomicCrmBundle

      - name: Install dependencies
        uses: ramsey/composer-install@v3
        with:
          working-directory: mautic

      - name: Run functional tests
        working-directory: mautic
        env:
          SYMFONY_ENV: test
          MAUTIC_ENV: test
          DB_PORT: ${{ job.services.database.ports[3306] }}
        run: |
          rm -rf var/cache
          php -d zend.assertions=1 bin/phpunit -d memory_limit=1G --bootstrap vendor/autoload.php --configuration app/phpunit.xml.dist plugins/MautomicCrmBundle/Tests/Functional/ --testdox

  architecture:
    name: "Architecture Validation"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4

      - name: Validate architecture
        run: |
          grep -q 'extends PluginBundleBase' MautomicCrmBundle.php || { echo "FAIL: Bundle must extend PluginBundleBase"; exit 1; }

          grep -q '"type": "mautic-plugin"' composer.json || { echo "FAIL: composer.json type must be mautic-plugin"; exit 1; }

          test -f Config/config.php || { echo "FAIL: Config/config.php missing"; exit 1; }
          test -f Config/services.php || { echo "FAIL: Config/services.php missing"; exit 1; }

          for f in Entity/*.php; do
            case "$f" in *Repository.php) continue;; esac
            grep -q 'function loadMetadata' "$f" || { echo "FAIL: $f missing loadMetadata()"; exit 1; }
          done

          test -f Translations/en_US/messages.ini || { echo "FAIL: translations missing"; exit 1; }

          echo "All architecture checks passed"
