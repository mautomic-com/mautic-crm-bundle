name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, dom, filter, gd, json, zip
          tools: composer:v2
          coverage: none

      - name: Clone Mautic
        run: |
          git clone --depth 1 --branch 7.0 https://github.com/mautic/mautic.git mautic
          cd mautic && composer install --no-interaction --prefer-dist --no-progress

      - name: Install plugin into Mautic
        run: |
          ln -s ${{ github.workspace }}/plugin ${{ github.workspace }}/mautic/plugins/MautomicCrmBundle
          cd mautic && composer dump-autoload

      - name: Run unit tests
        working-directory: mautic
        run: php bin/phpunit plugins/MautomicCrmBundle/Tests/Unit/ --testdox

  functional-tests:
    name: Functional Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: mautic
          MYSQL_DATABASE: mautic_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, dom, filter, gd, json, zip
          tools: composer:v2
          coverage: none

      - name: Clone Mautic
        run: |
          git clone --depth 1 --branch 7.0 https://github.com/mautic/mautic.git mautic
          cd mautic && composer install --no-interaction --prefer-dist --no-progress

      - name: Install plugin into Mautic
        run: |
          ln -s ${{ github.workspace }}/plugin ${{ github.workspace }}/mautic/plugins/MautomicCrmBundle
          cd mautic && composer dump-autoload

      - name: Install Mautic
        working-directory: mautic
        env:
          APP_ENV: test
          DATABASE_URL: mysql://root:mautic@127.0.0.1:3306/mautic_test
        run: |
          php bin/console mautic:install http://localhost --force --no-interaction || true
          php bin/console cache:clear --env=test

      - name: Run functional tests
        working-directory: mautic
        env:
          APP_ENV: test
          DATABASE_URL: mysql://root:mautic@127.0.0.1:3306/mautic_test
        run: php bin/phpunit -c app/phpunit.xml.dist plugins/MautomicCrmBundle/Tests/Functional/ --testdox

  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, dom, filter, gd, json, zip
          tools: composer:v2
          coverage: none

      - name: Clone Mautic
        run: |
          git clone --depth 1 --branch 7.0 https://github.com/mautic/mautic.git mautic
          cd mautic && composer install --no-interaction --prefer-dist --no-progress

      - name: Install plugin into Mautic
        run: |
          ln -s ${{ github.workspace }}/plugin ${{ github.workspace }}/mautic/plugins/MautomicCrmBundle
          cd mautic && composer dump-autoload

      - name: PHPStan
        working-directory: mautic
        run: php vendor/bin/phpstan analyse plugins/MautomicCrmBundle --level=6 --no-progress
        continue-on-error: true

      - name: Coding standards
        working-directory: mautic
        run: php vendor/bin/php-cs-fixer fix plugins/MautomicCrmBundle --dry-run --diff --config=.php-cs-fixer.php
        continue-on-error: true
