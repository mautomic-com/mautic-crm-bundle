name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: mautic
          MYSQL_DATABASE: mautic_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, dom, filter, gd, json, zip
          tools: composer:v2

      - name: Clone Mautic 7
        run: |
          git clone --depth 1 --branch 7.x https://github.com/mautic/mautic.git mautic
          cd mautic
          composer install --no-interaction --prefer-dist --no-progress

      - name: Link plugin into Mautic
        run: ln -s ${{ github.workspace }}/plugin ${{ github.workspace }}/mautic/plugins/MautomicCrmBundle

      - name: PHPStan
        working-directory: mautic
        run: php vendor/bin/phpstan analyse plugins/MautomicCrmBundle --level=6 --no-progress

      - name: Coding Standards
        working-directory: mautic
        run: php vendor/bin/php-cs-fixer fix plugins/MautomicCrmBundle --dry-run --diff --config=.php-cs-fixer.php

      - name: PHPUnit
        working-directory: mautic
        run: php bin/phpunit plugins/MautomicCrmBundle/Tests/
